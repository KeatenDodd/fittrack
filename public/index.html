<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#e9dcbd" />
  <title>FitTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Marcellus&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="alternate icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <header class="app-header hidden" id="appHeader">
    <div class="inner">
      <span class="brand">Fit<b>Track</b></span>
      <nav class="top-nav" id="topNav"></nav>
      <span class="header-user" id="headerUser"></span>
    </div>
  </header>

  <main id="view"></main>

  <nav class="tab-bar hidden" id="tabBar"></nav>
  <div id="toast"></div>
  <div id="modal-root"></div>

  <!-- Chart.js + barcode scanner from CDN. Vendor into /public/vendor for fully offline use. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
